global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.yaml

scrape_configs:
  - job_name: inference
    static_configs:
      - targets: ['inference:9090']
  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ['gateway:8000']
  - job_name: analytics
    metrics_path: /metrics
    static_configs:
      - targets: ['analytics:8002']
