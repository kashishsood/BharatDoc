name: PR Checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-validation:
    name: Fast PR Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-timeout
      
      - name: Run ruff check
        id: ruff
        run: |
          ruff check gateway/ inference/ schemas/ router/ core/ data_pipeline/ evaluation/ feedback_loop/ training/ apps/ --output-format=github
        continue-on-error: true
      
      - name: Run pytest (fast mode)
        id: pytest
        run: |
          pytest tests/ --tb=short --timeout=30 -v
        continue-on-error: true
      
      - name: Comment PR with results
        uses: actions/github-script@v7
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const ruffStatus = '${{ steps.ruff.outcome }}';
            const pytestStatus = '${{ steps.pytest.outcome }}';
            
            const ruffEmoji = ruffStatus === 'success' ? '✅' : '❌';
            const pytestEmoji = pytestStatus === 'success' ? '✅' : '❌';
            
            const overallStatus = (ruffStatus === 'success' && pytestStatus === 'success') ? '✅ PASS' : '❌ FAIL';
            
            const body = `## PR Validation Results ${overallStatus}
            
            | Check | Status |
            |-------|--------|
            | Ruff Linting | ${ruffEmoji} ${ruffStatus.toUpperCase()} |
            | Pytest | ${pytestEmoji} ${pytestStatus.toUpperCase()} |
            
            ${ruffStatus === 'failure' ? '⚠️ **Linting issues detected.** Please run `ruff check --fix` locally.' : ''}
            ${pytestStatus === 'failure' ? '⚠️ **Tests failed.** Please review test output and fix failing tests.' : ''}
            
            ---
            *Automated PR validation by GitHub Actions*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
      
      - name: Fail workflow if checks failed
        if: steps.ruff.outcome == 'failure' || steps.pytest.outcome == 'failure'
        run: |
          echo "PR validation failed. Please fix the issues above."
          exit 1
